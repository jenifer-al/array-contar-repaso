<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <title>CONTAR STRING</title>
</head>

<body class="bg-linear-to-r from-cyan-200 to-teal-200 min-h-screen p-2 sm:p-4">

  <header class="border-4 border-cyan-700 border-dashed bg-linear-to-r from-cyan-300 to-teal-100 rounded-3xl mt-2 mb-20 mx-auto w-[95%] p-6 sm:p-6 lg:border-8 lg:p-10 lg:w-4/5">
    <h1 class="text-center text-3xl sm:text-3xl lg:text-4xl 2xl:text-5xl text-cyan-700 font-bold [text-shadow:0_0_12px_rgba(255,255,255,1)]">
      CONTAR STRING
    </h1>
  </header>

  <main class="w-[95%] mx-auto">
    <details open class="mb-20 mx-auto w-full lg:w-4/5 border-2 border-cyan-300 rounded-2xl p-4 bg-cyan-50/50">
      <summary class="cursor-pointer bg-linear-to-r from-cyan-600 to-teal-300 rounded-2xl w-full p-2 pl-4 text-white font-bold mb-4 shadow-md hover:from-cyan-700 hover:to-teal-400 transition-all">
        Contar string
      </summary>
      <p class="px-4 text-cyan-800 font-medium max-w-4xl">
        Programa una función que cuente el número de caracteres de una cadena de texto, pe. miFunción("Hola Mundo") devolverá 10
      </p>
    </details>

    <section class="flex flex-col lg:flex-row items-center justify-center gap-16 px-4 transition-all duration-300">
      
      <section class="w-full sm:w-[90%] md:w-3/4 lg:w-1/2 border-2 border-cyan-600 bg-linear-to-r from-cyan-400 to-teal-200 rounded-2xl pb-6 pt-2 flex flex-col items-center shadow-lg">
        
        <h2 class="text-center pb-4 mt-4 text-cyan-700 font-bold text-2xl sm:text-3xl border-2 border-solid border-cyan-600 rounded-2xl w-[90%] mb-8 bg-white/30">
          Texto
        </h2>

        <div class="flex flex-col items-center gap-4 w-full px-8">
          <label class="text-cyan-700 font-bold self-start pl-2">Introduce un texto: </label>
          <input class="border-cyan-600 rounded-2xl w-full border-2 border-solid text-center p-2 bg-cyan-50/50 font-bold text-cyan-900" type="text" id="texto" />

          <button class="border-cyan-500 border-2 border-solid rounded-2xl w-full sm:w-1/3 bg-linear-to-r from-cyan-500 to-teal-300 text-cyan-700 font-bold py-2 mt-4 transition-all duration-300 ease-in-out hover:bg-linear-to-r hover:from-green-400 hover:to-teal-400 hover:text-white hover:shadow-lg hover:scale-105" id="calcular" type="button">
            CONTAR
          </button>
        </div>
          
        <p class="w-[90%] border-2 border-solid border-cyan-600 mx-auto mt-8 py-3 rounded-2xl text-center font-bold text-cyan-900 bg-cyan-50/50" id="resultado"></p>
      </section>

      <div class="w-full lg:w-1/3 flex justify-center p-6">
        <img class="w-full max-w-[200px] lg:max-w-xs object-contain drop-shadow-xl" src="imagenes/texto.png" alt="imagen de letras" />
      </div>
    </section>
  </main>

  <script src="js/string.js"></script>
</body>
</html>
